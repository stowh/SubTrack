syntax = "proto3";

package subscribes;

option go_package = "grpc/contracts/subscribes;subscribespb";

service SubscribesService {
  rpc CreateSub(CreateSubRequest) returns (CreateSubResponse);
  rpc RemoveSub(RemoveSubRequest) returns (RemoveSubResponse);
  rpc PutSub(PutSubRequest) returns (PutSubResponse);
  rpc GetSubs(GetSubsRequest) returns (GetSubsResponse);
}

message CreateSubRequest {
  int64 account_id = 1;
  string subscription_name = 2;
  string subscription_title = 3;
  int64 subscription_pay_per_month = 4;
}

message CreateSubResponse {
  int64 subscription_id = 1;
}

message RemoveSubRequest {
  int64 account_id = 1;
  int64 subscription_id = 2;
}

message RemoveSubResponse {
  bool success = 1;
}

message PutSubRequest {
  int64 account_id = 1;
  int64 subscription_id = 2;
  string subscription_name = 3;
  string subscription_title = 4;
  int64 subscription_pay_per_month = 5;
  int64 subscription_status = 6;
}

message PutSubResponse {
  bool success = 1;
}

message GetSubsRequest {
  int64 account_id = 1;
  uint32 limit = 2;
}

message Subscription {
  int64 subscription_id = 1;
  string subscription_name = 2;
  string subscription_title = 3;
  int64 subscription_pay_per_month = 4;
  int64 subscription_status = 5;
  int64 created_at_unix = 6;
}

message GetSubsResponse {
  repeated Subscription items = 1;
}
