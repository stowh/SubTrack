syntax = "proto3";

package analytics;

option go_package = "grpc/contracts/analytics;analyticspb";

service AnalyticsService {
  rpc TrackEvent(TrackEventRequest) returns (TrackEventResponse);
  rpc GetEvents(GetEventsRequest) returns (GetEventsResponse);
  rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse);
}

message TrackEventRequest {
  int64 event_id = 1;
  string event_type = 2;
  int64 account_id = 3;
  string payload = 4;
  string user_agent = 5;
  int64 created_at_unix = 6;
}

message TrackEventResponse {
  int64 event_id = 1;
}

message GetEventsRequest {
  int64 account_id = 1;
  string event_type = 2;
  int64 from_unix = 3;
  int64 to_unix = 4;
  uint32 limit = 5;
}

message Event {
  int64 event_id = 1;
  string event_type = 2;
  int64 account_id = 3;
  string payload = 4;
  string user_agent = 5;
  int64 created_at_unix = 6;
}

message GetEventsResponse {
  repeated Event items = 1;
  uint64 total = 2;
}

message GetMetricsRequest {
  int64 from_unix = 1;
  int64 to_unix = 2;
}

message MetricItem {
  string event_type = 1;
  uint64 count = 2;
}

message GetMetricsResponse {
  uint64 accounts_created = 1;
  uint64 logins = 2;
  uint64 logouts = 3;
  uint64 refreshes = 4;
  uint64 subscriptions_created = 5;
  uint64 subscriptions_updated = 6;
  uint64 subscriptions_removed = 7;
  uint64 total_events = 8;
  repeated MetricItem by_event_type = 9;
}
