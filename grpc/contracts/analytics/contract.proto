syntax = "proto3";

package analytics;

option go_package = "grpc/contracts/analytics;analyticspb";

service AnalyticsService {
  rpc TrackEvent(TrackEventRequest) returns (TrackEventResponse);
  rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse);
  rpc GetTimeSeries(GetTimeSeriesRequest) returns (GetTimeSeriesResponse);
  rpc GetTopEntities(GetTopEntitiesRequest) returns (GetTopEntitiesResponse);
}

message TrackEventRequest {
  string event_name = 1;
  int64 account_id = 2;
  string entity_type = 3;
  int64 entity_id = 4;
  int64 occurred_at_unix = 5;
  map<string, string> properties = 6;
}

message TrackEventResponse {
  bool success = 1;
}

message GetMetricsRequest {
  int64 from_unix = 1;
  int64 to_unix = 2;
}

message GetMetricsResponse {
  int64 new_accounts = 1;
  int64 logins = 2;
  int64 active_accounts = 3;
  int64 subscriptions_created = 4;
  int64 subscriptions_removed = 5;
  int64 revenue_minor = 6;
}

enum TimeSeriesInterval {
  TIME_SERIES_INTERVAL_UNSPECIFIED = 0;
  TIME_SERIES_INTERVAL_HOUR = 1;
  TIME_SERIES_INTERVAL_DAY = 2;
  TIME_SERIES_INTERVAL_WEEK = 3;
}

message TimeSeriesPoint {
  int64 bucket_start_unix = 1;
  int64 value = 2;
}

message GetTimeSeriesRequest {
  string metric = 1;
  int64 from_unix = 2;
  int64 to_unix = 3;
  TimeSeriesInterval interval = 4;
}

message GetTimeSeriesResponse {
  repeated TimeSeriesPoint points = 1;
}

message GetTopEntitiesRequest {
  string metric = 1;
  string entity_type = 2;
  int64 from_unix = 3;
  int64 to_unix = 4;
  uint32 limit = 5;
}

message TopEntity {
  int64 entity_id = 1;
  int64 value = 2;
}

message GetTopEntitiesResponse {
  repeated TopEntity items = 1;
}
